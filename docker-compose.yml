services:
  postgres:
    image: postgres:16-alpine
    container_name: dnpxia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dnpxia
      POSTGRES_USER: dnpxia
      POSTGRES_PASSWORD: dnpxia
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
