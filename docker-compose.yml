services:
  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/web:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./apps/api:/app
    command: sh -c "npm install && npm run dev"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: dnpxia
      DB_PASSWORD: dnpxia
      DB_NAME: dnpxia
    ports:
      - "4000:4000"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dnpxia
      POSTGRES_PASSWORD: dnpxia
      POSTGRES_DB: dnpxia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
